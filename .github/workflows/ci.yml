name: CI

on:
  push:
    branches:
      - main
    tags-ignore:
      - "v*"
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE*"
      - ".gitignore"
      - ".dockerignore"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE*"
      - ".gitignore"
      - ".dockerignore"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: lint-and-test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://llm_app:change_me_securely@localhost:5432/llm_platform
      OLLAMA_URL: http://localhost:11434
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

      - name: Run Ruff lint
        run: make lint

      - name: Run test suite
        run: make test
