repository:
  name: llm-conversation-platform
  description: Production-ready FastAPI backend for persisting LLM conversations and messages using local Ollama models.
  default_branch: main
  delete_branch_on_merge: true
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: true
  has_projects: false
  has_wiki: false

branches:
  - name: main
    protection:
      enforce_admins: false
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
      restrictions: null
